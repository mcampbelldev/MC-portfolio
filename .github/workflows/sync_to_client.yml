name: Sync to Client Repository

on:
  push:
    branches:
      - main # O la rama que uses como principal

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Client Repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # TOKEN DE MARCELO: Requerido para poder escribir en su repositorio
          API_TOKEN_GITHUB: ${{ secrets.MARCELO_GITHUB_TOKEN }}
        with:
          source-directory: '.'
          # LA CUENTA ORIGEN (Cruz): Evita que se copie el propio directorio .github (opcional, pero buena práctica si Marcelo no necesita los workflows internos)
          # Esto evita hacer un loop infinito si copiáramos también el workflow
          target-directory: '' 
          destination-github-username: 'mcampbelldev'
          destination-repository-name: 'MC-portfolio'
          user-email: 'bot@github.com'
          target-branch: main
          commit-message: "chore: Auto-sync from agency repository"
